# =========================================================
# symptoms.yaml — Canonical symptom name aliases
# =========================================================
# Allows the matcher to normalise patient-reported symptom
# variations to a single canonical name used in diseases.yaml.
#
# Schema:
#   canonical: the name used in diseases.yaml
#   aliases:   list of alternative expressions
# =========================================================

