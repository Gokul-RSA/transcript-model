# =========================================================
# risk_factors.yaml — Clinical risk factor definitions
# =========================================================
# Schema:
#   id                : unique snake_case identifier
#   name              : human-readable name
#   category          : category grouping
#   detection_terms   : strings to match in medical_history,
#                       current_medications, or social_history
#   source_fields     : which ClinicalState fields to check
#   confidence_modifier: default delta when this factor is present
# =========================================================

