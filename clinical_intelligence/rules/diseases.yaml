# =========================================================
# diseases.yaml — Disease definitions with weighted symptoms
# =========================================================
# Schema per disease:
#   id                    : unique snake_case identifier
#   name                  : human-readable name
#   category              : clinical category
#   icd10                 : ICD-10 code (informational)
#   cardinal_symptoms     : list of {name, weight} — highest-impact symptoms
#   supportive_symptoms   : list of {name, weight} — additional supporting symptoms
#   risk_factor_modifiers : dict of risk_factor_id → confidence delta
#   age_range             : {min, max, modifier} — age-based confidence delta
#   gender_modifier       : {gender, modifier} — optional gender-based delta
#   vital_sign_criteria   : conditions on vitals that add confidence
#   negation_penalty      : confidence reduction per negated cardinal symptom
#   min_diagnosis_threshold : minimum confidence to include in output
# =========================================================

- id: acs
  name: Acute Coronary Syndrome
  category: cardiovascular
  icd10: I24.9
  cardinal_symptoms:
    - name: chest pain
      weight: 0.35
    - name: chest tightness
      weight: 0.30
    - name: chest pressure
      weight: 0.30
    - name: radiating arm pain
      weight: 0.20
    - name: jaw pain
      weight: 0.15
  supportive_symptoms:
    - name: shortness of breath
      weight: 0.10
    - name: sweating
      weight: 0.08
    - name: nausea
      weight: 0.06
    - name: palpitations
      weight: 0.06
    - name: dizziness
      weight: 0.05
    - name: fatigue
      weight: 0.04
  risk_factor_modifiers:
    hypertension: 0.10
    diabetes: 0.08
    smoking: 0.07
    obesity: 0.05
    family_history_cardiac: 0.10
    hyperlipidemia: 0.06
    previous_cardiac_event: 0.15
  age_range:
    min: 40
    modifier: 0.08
  gender_modifier:
    gender: Male
    modifier: 0.05
  vital_sign_criteria:
    - condition: bp_systolic_gt
      threshold: 140
      modifier: 0.05
    - condition: pulse_gt
      threshold: 100
      modifier: 0.05
    - condition: spo2_lt
      threshold: 95
      modifier: 0.08
  negation_penalty: 0.20
  min_diagnosis_threshold: 0.25

